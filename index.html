<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voter Search Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="max-w-full mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-center text-indigo-900 mb-6">Voter Search Portal</h1>

    <div id="statusMsg" class="bg-blue-100 text-blue-800 p-3 rounded mb-5 text-center font-semibold">
      Loading voter data...
    </div>

    <div class="bg-white rounded-xl shadow p-5 mb-5">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-semibold mb-1">Voter Name</label>
          <input id="name" type="text" placeholder="e.g. Javaji Obulapati" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Relation Name</label>
          <input id="relation" type="text" placeholder="e.g. Father/Spouse name" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Part Number</label>
          <input id="part" type="text" placeholder="e.g. 16" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">House Number</label>
          <input id="hno" type="text" placeholder="e.g. 1-2" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
      </div>

      <div class="flex flex-col md:flex-row gap-3 mt-5">
        <button id="searchBtn" onclick="searchData()" disabled class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-lg disabled:bg-gray-400">
          Search
        </button>
        <button onclick="clearSearch()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-6 py-3 rounded-lg">
          Clear
        </button>
      </div>
    </div>

    <div id="count" class="mb-3 font-semibold text-gray-700 text-lg"></div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-indigo-900 text-white sticky top-0">
            <tr>
              <th class="p-3 text-left">Part</th>
              <th class="p-3 text-left">SL No</th>
              <th class="p-3 text-left">Name</th>
              <th class="p-3 text-left">Relation</th>
              <th class="p-3 text-left">Age</th>
              <th class="p-3 text-left">Sex</th>
              <th class="p-3 text-left">House No</th>
              <th class="p-3 text-left">EPIC</th>
            </tr>
          </thead>
          <tbody id="results" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden p-8 text-center text-gray-500">No results found</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="mt-5 flex justify-center gap-2 flex-wrap hidden">
      <button onclick="prevPage()" class="bg-indigo-600 text-white px-4 py-2 rounded">← Previous</button>
      <span id="pageInfo" class="px-4 py-2 font-semibold"></span>
      <button onclick="nextPage()" class="bg-indigo-600 text-white px-4 py-2 rounded">Next →</button>
    </div>
  </div>

  <script>
    let rawData = [];
    let indexedData = [];
    let filteredResults = [];
    let currentPage = 1;
    const resultsPerPage = 50;

    function normalizeText(value) {
      return String(value ?? "")
        .toUpperCase()
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^A-Z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeNumberLike(value) {
      return String(value ?? "")
        .toUpperCase()
        .replace(/\s+/g, "")
        .trim();
    }

    async function loadData() {
      try {
        const response = await fetch("./voter_data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not load voter_data.json");
        }

        rawData = await response.json();

        document.getElementById("statusMsg").className =
          "bg-yellow-100 text-yellow-800 p-3 rounded mb-5 text-center font-semibold";
        document.getElementById("statusMsg").innerText =
          "Data loaded. Preparing search index...";

        indexedData = rawData.map(item => ({
          original: item,
          name: normalizeText(item.NAME_ENG),
          relation: normalizeText(item.RELATION_NAME),
          part: normalizeNumberLike(item.part_no),
          hno: normalizeNumberLike(item.New_Hno)
        }));

        document.getElementById("statusMsg").className =
          "bg-green-100 text-green-800 p-3 rounded mb-5 text-center font-semibold";
        document.getElementById("statusMsg").innerText =
          `Data ready! (${rawData.length} records loaded)`;

        document.getElementById("searchBtn").disabled = false;
      } catch (error) {
        document.getElementById("statusMsg").className =
          "bg-red-100 text-red-800 p-3 rounded mb-5 text-center font-semibold";
        document.getElementById("statusMsg").innerText =
          "Error loading data: " + error.message;
      }
    }

    function matchesAllWords(source, query) {
      if (!query) return true;
      const words = query.split(" ").filter(Boolean);
      return words.every(word => source.includes(word));
    }

    function searchData() {
      const nameQuery = normalizeText(document.getElementById("name").value);
      const relationQuery = normalizeText(document.getElementById("relation").value);
      const partQuery = normalizeNumberLike(document.getElementById("part").value);
      const hnoQuery = normalizeNumberLike(document.getElementById("hno").value);

      filteredResults = indexedData.filter(item => {
        const matchName = !nameQuery || matchesAllWords(item.name, nameQuery);
        const matchRelation = !relationQuery || matchesAllWords(item.relation, relationQuery);
        const matchPart = !partQuery || item.part === partQuery;
        const matchHno = !hnoQuery || item.hno.includes(hnoQuery);

        return matchName && matchRelation && matchPart && matchHno;
      });

      currentPage = 1;
      displayResults();
    }

    function displayResults() {
      const tbody = document.getElementById("results");
      const empty = document.getElementById("empty");
      const count = document.getElementById("count");
      const pagination = document.getElementById("pagination");

      tbody.innerHTML = "";

      const totalResults = filteredResults.length;
      count.innerText = `Found ${totalResults} result${totalResults === 1 ? "" : "s"}`;

      if (totalResults === 0) {
        empty.classList.remove("hidden");
        pagination.classList.add("hidden");
        return;
      }

      empty.classList.add("hidden");

      // Calculate pagination
      const totalPages = Math.ceil(totalResults / resultsPerPage);
      const startIdx = (currentPage - 1) * resultsPerPage;
      const endIdx = startIdx + resultsPerPage;
      const pageResults = filteredResults.slice(startIdx, endIdx);

      // Display rows
      pageResults.forEach(item => {
        const row = item.original;
        tbody.innerHTML += `
          <tr class="hover:bg-gray-50">
            <td class="p-3 font-semibold text-indigo-700">${row.part_no ?? "-"}</td>
            <td class="p-3 text-sm text-gray-600">${row.slnoinpart ?? "-"}</td>
            <td class="p-3 font-semibold text-gray-900">${row.NAME_ENG ?? "-"}</td>
            <td class="p-3 text-gray-700">${row.RELATION_NAME ?? "-"}</td>
            <td class="p-3 text-center">${row.age ?? "-"}</td>
            <td class="p-3 text-center font-bold">${row.sex ?? "-"}</td>
            <td class="p-3 font-mono text-sm">${row.New_Hno ?? "-"}</td>
            <td class="p-3 font-mono text-xs text-indigo-600">${row.EPIC ?? "-"}</td>
          </tr>
        `;
      });

      // Show pagination if needed
      if (totalPages > 1) {
        pagination.classList.remove("hidden");
        document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages}`;
      } else {
        pagination.classList.add("hidden");
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(filteredResults.length / resultsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        displayResults();
        window.scrollTo(0, 0);
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        displayResults();
        window.scrollTo(0, 0);
      }
    }

    function clearSearch() {
      document.getElementById("name").value = "";
      document.getElementById("relation").value = "";
      document.getElementById("part").value = "";
      document.getElementById("hno").value = "";
      document.getElementById("results").innerHTML = "";
      document.getElementById("empty").classList.add("hidden");
      document.getElementById("count").innerText = "";
      document.getElementById("pagination").classList.add("hidden");
      filteredResults = [];
      currentPage = 1;
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        searchData();
      }
    });

    loadData();
  </script>
</body>
</html>
