<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-indigo-900">Voter Search Portal</h1>
        
        <!-- Status Message -->
        <div id="statusMsg" class="bg-blue-100 text-blue-800 p-3 rounded mb-4 text-center font-semibold">
            Loading 77MB data... please wait...
        </div>

        <!-- Search Form -->
        <div class="bg-white p-4 rounded shadow mb-4 grid grid-cols-1 md:grid-cols-4 gap-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Voter Name</label>
                <input type="text" id="name" class="w-full border p-2 rounded" placeholder="Enter name">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Part Number</label>
                <input type="text" id="part" class="w-full border p-2 rounded" placeholder="e.g. 16">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">House Number</label>
                <input type="text" id="hno" class="w-full border p-2 rounded" placeholder="e.g. 1-23">
            </div>
            <div class="flex items-end">
                <button onclick="search()" id="btn" disabled class="w-full bg-indigo-600 text-white p-2 rounded font-bold disabled:bg-gray-400">
                    Search
                </button>
            </div>
        </div>

        <!-- Results Count -->
        <div id="count" class="mb-2 font-semibold text-gray-700"></div>

        <!-- Results Table -->
        <div class="bg-white rounded shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-indigo-900 text-white">
                    <tr>
                        <th class="p-3 text-left">Part No</th>
                        <th class="p-3 text-left">Name</th>
                        <th class="p-3 text-left">Relation</th>
                        <th class="p-3 text-left">House No</th>
                    </tr>
                </thead>
                <tbody id="results" class="divide-y divide-gray-200"></tbody>
            </table>
            <div id="empty" class="p-8 text-center text-gray-500 hidden">No results found</div>
        </div>
    </div>

    <script>
        let data = [];
        let isLoaded = false;

        // Load the JSON file
        fetch('./voter_data.json')
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.json();
            })
            .then(json => {
                data = json;
                isLoaded = true;
                document.getElementById('statusMsg').className = "bg-green-100 text-green-800 p-3 rounded mb-4 text-center font-semibold";
                document.getElementById('statusMsg').innerText = `✅ Data loaded successfully! (${data.length} records)`;
                document.getElementById('btn').disabled = false;
                console.log("Sample record:", data[0]); // Check console for actual field names
            })
            .catch(err => {
                document.getElementById('statusMsg').className = "bg-red-100 text-red-800 p-3 rounded mb-4 text-center font-semibold";
                document.getElementById('statusMsg').innerText = "❌ Error loading data: " + err.message;
            });

        function search() {
            if (!isLoaded) return;

            const nameVal = document.getElementById('name').value.toUpperCase().trim();
            const partVal = document.getElementById('part').value.trim();
            const hnoVal = document.getElementById('hno').value.trim();

            // Filter logic - ALL fields are optional
            const filtered = data.filter(item => {
                // Get values safely (handle undefined)
                const name = (item.NAME_ENG || "").toUpperCase();
                const part = String(item.part_no || "");
                const hno = String(item.New_Hno || "");
                const rel = item.RELATION_NAME || "";

                // Check matches
                const matchName = !nameVal || name.includes(nameVal);
                const matchPart = !partVal || part === partVal;
                const matchHno = !hnoVal || hno.includes(hnoVal);

                return matchName && matchPart && matchHno;
            });

            // Display results
            display(filtered);
        }

        function display(results) {
            const tbody = document.getElementById('results');
            const empty = document.getElementById('empty');
            const count = document.getElementById('count');
            
            tbody.innerHTML = '';
            count.innerText = `Found ${results.length} results`;

            if (results.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                // Show first 100 only for performance
                results.slice(0, 100).forEach(item => {
                    const row = `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-3 font-bold text-indigo-600">${item.part_no || '-'}</td>
                            <td class="p-3 font-semibold">${item.NAME_ENG || '-'}</td>
                            <td class="p-3 text-gray-600">${item.RELATION_NAME || '-'}</td>
                            <td class="p-3 font-mono text-sm">${item.New_Hno || '-'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        // Allow Enter key to search
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
