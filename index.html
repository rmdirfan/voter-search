<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Search Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-full mx-auto">
    <h1 class="text-3xl font-bold text-center text-indigo-900 mb-6">Voter Search Portal</h1>

    <div id="status" class="bg-blue-100 text-blue-800 p-3 rounded mb-4 text-center font-semibold">
      Loading voter data...
    </div>

    <!-- Search Boxes -->
    <div class="bg-white p-5 rounded-xl shadow mb-5">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Voter Name</label>
          <input id="s_name" type="text" placeholder="Enter name" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Relation Name</label>
          <input id="s_relation" type="text" placeholder="Enter relation" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">House Number</label>
          <input id="s_hno" type="text" placeholder="e.g. 1-23" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">EPIC Number</label>
          <input id="s_epic" type="text" placeholder="e.g. ABC123" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Polling Station (Part No)</label>
          <input id="s_part" type="text" placeholder="e.g. 16" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button id="searchBtn" onclick="doSearch()" disabled class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-lg disabled:bg-gray-400">
          Search
        </button>
        <button onclick="clearAll()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-6 py-3 rounded-lg">
          Clear
        </button>
      </div>
    </div>

    <div id="count" class="mb-3 font-semibold text-gray-700 text-lg"></div>

    <!-- Results Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-indigo-900 text-white sticky top-0">
            <tr>
              <th class="p-3 text-left">Part No</th>
              <th class="p-3 text-left">SL No</th>
              <th class="p-3 text-left">Voter Name</th>
              <th class="p-3 text-left">Relation Name</th>
              <th class="p-3 text-left">Age</th>
              <th class="p-3 text-left">Sex</th>
              <th class="p-3 text-left">House No</th>
              <th class="p-3 text-left">EPIC</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden p-8 text-center text-gray-500">No results found.</div>
    </div>

    <!-- Pagination -->
    <div id="pageNav" class="mt-5 flex justify-center items-center gap-3 hidden">
      <button onclick="prevPage()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2 rounded-lg">← Previous</button>
      <span id="pageInfo" class="font-semibold text-gray-700"></span>
      <button onclick="nextPage()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2 rounded-lg">Next →</button>
    </div>
  </div>

  <script>
    let allData = [];
    let searchResults = [];
    let currentPage = 1;
    const PER_PAGE = 50;

    function norm(v) {
      return String(v ?? '').toUpperCase().replace(/[^A-Z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function rawNorm(v) {
      return String(v ?? '').toUpperCase().replace(/\s+/g, '').trim();
    }

    async function loadData() {
      try {
        const r = await fetch('./voter_data.json', { cache: 'no-store' });
        if (!r.ok) throw new Error('File not found');
        allData = await r.json();
        document.getElementById('status').className = 'bg-green-100 text-green-800 p-3 rounded mb-4 text-center font-semibold';
        document.getElementById('status').innerText = `✅ ${allData.length.toLocaleString()} records loaded successfully.`;
        document.getElementById('searchBtn').disabled = false;
      } catch (e) {
        document.getElementById('status').className = 'bg-red-100 text-red-800 p-3 rounded mb-4 text-center font-semibold';
        document.getElementById('status').innerText = '❌ Error: ' + e.message;
      }
    }

    function doSearch() {
      const qName = norm(document.getElementById('s_name').value);
      const qRel = norm(document.getElementById('s_relation').value);
      const qHno = rawNorm(document.getElementById('s_hno').value);
      const qEpic = rawNorm(document.getElementById('s_epic').value);
      const qPart = String(document.getElementById('s_part').value).trim();

      if (!qName && !qRel && !qHno && !qEpic && !qPart) {
        alert('Please enter at least one search field.');
        return;
      }

      searchResults = allData.filter(d => {
        const name = norm(d.NAME_ENG);
        const rel = norm(d.RELATION_NAME);
        const hno = rawNorm(d.New_Hno);
        const epic = rawNorm(d.EPIC);
        const part = String(d.part_no ?? '').trim();

        const mName = !qName || name.includes(qName);
        const mRel = !qRel || rel.includes(qRel);
        const mHno = !qHno || hno.includes(qHno);
        const mEpic = !qEpic || epic.includes(qEpic);
        const mPart = !qPart || part === qPart;

        return mName && mRel && mHno && mEpic && mPart;
      });

      currentPage = 1;
      render();
    }

    function render() {
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');
      const nav = document.getElementById('pageNav');

      tbody.innerHTML = '';
      count.innerText = `Found ${searchResults.length} result${searchResults.length === 1 ? '' : 's'}.`;

      if (searchResults.length === 0) {
        empty.classList.remove('hidden');
        nav.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');

      const totalPages = Math.ceil(searchResults.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const end = start + PER_PAGE;
      const page = searchResults.slice(start, end);

      page.forEach(d => {
        const row = `
          <tr class="hover:bg-gray-50 border-b">
            <td class="p-3 font-bold text-indigo-700">${d.part_no ?? '-'}</td>
            <td class="p-3">${d.slnoinpart ?? '-'}</td>
            <td class="p-3 font-bold text-gray-900">${d.NAME_ENG ?? '-'}</td>
            <td class="p-3">${d.RELATION_NAME ?? '-'}</td>
            <td class="p-3 text-center">${d.age ?? '-'}</td>
            <td class="p-3 text-center font-bold">${d.sex ?? '-'}</td>
            <td class="p-3 font-mono">${d.New_Hno ?? '-'}</td>
            <td class="p-3 font-mono text-xs text-indigo-600">${d.EPIC ?? '-'}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });

      if (totalPages > 1) {
        nav.classList.remove('hidden');
        document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
      } else {
        nav.classList.add('hidden');
      }
    }

    function nextPage() {
      const t = Math.ceil(searchResults.length / PER_PAGE);
      if (currentPage < t) { currentPage++; render(); window.scrollTo(0, 0); }
    }

    function prevPage() {
      if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); }
    }

    function clearAll() {
      ['s_name','s_relation','s_hno','s_epic','s_part'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('tbody').innerHTML = '';
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('count').innerText = '';
      document.getElementById('pageNav').classList.add('hidden');
      searchResults = [];
      currentPage = 1;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    loadData();
  </script>
</body>
</html>
