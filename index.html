<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Search - Constituency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-indigo-900">Voter Search Portal</h1>
            <p class="text-gray-600 mt-2">Search by Name, EPIC, or House Number</p>
        </div>

        <!-- Search Box -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <div id="loadingData" class="flex items-center justify-center space-x-3 mb-4">
                <div class="loading-spinner"></div>
                <span class="text-sm font-medium text-blue-600">Loading database (77MB)... please wait.</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Voter Name</label>
                    <input type="text" id="searchName" placeholder="Enter Name..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">EPIC Number</label>
                    <input type="text" id="searchEpic" placeholder="ABC1234567" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">House Number</label>
                    <input type="text" id="searchHno" placeholder="e.g. 1-23" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Part Number</label>
                    <input type="number" id="searchPart" placeholder="e.g. 145" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            
            <button onclick="performSearch()" id="searchBtn" disabled class="mt-6 w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition disabled:bg-gray-300">
                Search Voter
            </button>
        </div>

        <!-- Stats -->
        <div id="resultStats" class="mb-4 text-sm text-gray-600 hidden"></div>

        <!-- Results Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-indigo-900 text-white text-xs uppercase tracking-wider">
                            <th class="p-4">Part / SL</th>
                            <th class="p-4">EPIC</th>
                            <th class="p-4">Name</th>
                            <th class="p-4">Relation (RLTY)</th>
                            <th class="p-4">Age/Sex</th>
                            <th class="p-4">House No</th>
                            <th class="p-4">Polling Station</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-gray-200">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
            <div id="noResults" class="p-10 text-center text-gray-500 hidden">
                No voters found matching those details.
            </div>
        </div>
    </div>

    <script>
        let voterData = [];

        // 1. Fetch the 77MB File
        async function loadData() {
            try {
                const response = await fetch('./voter_data.json');
                voterData = await response.json();
                
                // Enable UI
                document.getElementById('loadingData').classList.add('hidden');
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('searchBtn').innerText = "Search Voter";
            } catch (error) {
                console.error("Error loading JSON:", error);
                document.getElementById('loadingData').innerHTML = "❌ Failed to load database.";
            }
        }

        // 2. Search Logic
        function performSearch() {
            const nameQuery = document.getElementById('searchName').value.toUpperCase().trim();
            const epicQuery = document.getElementById('searchEpic').value.toUpperCase().trim();
            const hnoQuery = document.getElementById('searchHno').value.trim();
            const partQuery = document.getElementById('searchPart').value.trim();

            if (!nameQuery && !epicQuery && !hnoQuery && !partQuery) {
                alert("Please enter at least one search criteria");
                return;
            }

            const results = voterData.filter(voter => {
                const matchName = !nameQuery || (voter.NAME_ENG && voter.NAME_ENG.toUpperCase().includes(nameQuery));
                const matchEpic = !epicQuery || (voter.EPIC && voter.EPIC.toUpperCase().includes(epicQuery));
                const matchHno = !hnoQuery || (voter.New_Hno && voter.New_Hno.toString().includes(hnoQuery));
                const matchPart = !partQuery || (voter.part_no && voter.part_no.toString() === partQuery);
                
                return matchName && matchEpic && matchHno && matchPart;
            });

            displayResults(results);
        }

        // 3. Render Results
        function displayResults(results) {
            const tbody = document.getElementById('resultsBody');
            const stats = document.getElementById('resultStats');
            const noResults = document.getElementById('noResults');
            
            tbody.innerHTML = '';
            stats.classList.remove('hidden');
            stats.innerText = `Found ${results.length} results.`;

            if (results.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                // Limit to 200 results for speed, you can remove slice(0,200) if needed
                results.slice(0, 200).forEach(voter => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-4 text-sm">
                                <span class="font-bold text-indigo-600">P:${voter.part_no}</span><br>
                                <span class="text-xs text-gray-500">SL:${voter.slnoinpart}</span>
                            </td>
                            <td class="p-4 font-mono font-bold text-sm">${voter.EPIC || 'N/A'}</td>
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${voter.NAME_ENG || ''}</div>
                                <div class="text-xs text-gray-500">AC: ${voter.ac_no}</div>
                            </td>
                            <td class="p-4 text-sm text-gray-700">
                                <strong>${voter.RLTY || ''}:</strong> ${voter['RELATION NAME'] || ''}
                            </td>
                            <td class="p-4 text-sm">
                                ${voter.age} / ${voter.sex}
                            </td>
                            <td class="p-4 text-sm font-semibold">${voter.New_Hno || ''}</td>
                            <td class="p-4 text-xs text-gray-500 max-w-xs truncate" title="${voter.Ps_Name_En}">
                                ${voter.Ps_Name_En || ''}
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
