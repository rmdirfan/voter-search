<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Search Portal</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9MXESXEBR1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9MXESXEBR1');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-full mx-auto">
    <h1 class="text-3xl font-bold text-center text-indigo-900 mb-2">Voter Search Portal</h1>
    <p class="text-center text-gray-500 mb-5 text-sm">Andhra Pradesh - Hindupur Lok Sabha</p>

    <!-- Constituency Selector (4 Constituencies) -->
    <div class="bg-white p-4 rounded-xl shadow mb-4">
      <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Select Constituency</label>
      <div class="flex gap-2 flex-wrap">
        <button id="btn_anantapur" onclick="switchConstituency('anantapur')"
          class="px-4 py-2 rounded-full font-bold border-2 border-indigo-600 bg-indigo-600 text-white transition-all text-sm">
          Anantapur
        </button>
        <button id="btn_dharmavaram" onclick="switchConstituency('dharmavaram')"
          class="px-4 py-2 rounded-full font-bold border-2 border-indigo-600 text-indigo-600 bg-white transition-all text-sm">
          Dharmavaram
        </button>
        <button id="btn_tadipatri" onclick="switchConstituency('tadipatri')"
          class="px-4 py-2 rounded-full font-bold border-2 border-indigo-600 text-indigo-600 bg-white transition-all text-sm">
          Tadipatri
        </button>
        <button id="btn_penukonda" onclick="switchConstituency('penukonda')"
          class="px-4 py-2 rounded-full font-bold border-2 border-indigo-600 text-indigo-600 bg-white transition-all text-sm">
          Penukonda
        </button>
      </div>
    </div>

    <!-- Storage Info -->
    <div id="storageInfo" class="bg-gray-50 p-3 rounded mb-4 text-xs text-gray-600 border border-gray-200">
      💾 Cache info will appear here
    </div>

    <!-- Status Bar -->
    <div id="status" class="bg-blue-100 text-blue-800 p-3 rounded mb-4 text-center font-semibold">
      Loading voter data...
    </div>

    <!-- Search Boxes -->
    <div class="bg-white p-5 rounded-xl shadow mb-5">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Voter Name</label>
          <input id="s_name" type="text" placeholder="Enter name"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Relation Name</label>
          <input id="s_relation" type="text" placeholder="Enter relation"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div id="field_hno">
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">House Number</label>
          <input id="s_hno" type="text" placeholder="e.g. 1-23"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div id="field_epic">
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">EPIC Number</label>
          <input id="s_epic" type="text" placeholder="e.g. ABC123"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Polling Station (Part No)</label>
          <input id="s_part" type="text" placeholder="e.g. 16"
            class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button id="searchBtn" onclick="doSearch()" disabled
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-lg disabled:bg-gray-400">
          Search
        </button>
        <button onclick="clearAll()"
          class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-6 py-3 rounded-lg">
          Clear
        </button>
        <button onclick="clearCache()"
          class="bg-red-100 hover:bg-red-200 text-red-700 font-semibold px-4 py-3 rounded-lg text-xs">
          🗑️ Clear Cache
        </button>
      </div>
    </div>

    <div id="count" class="mb-3 font-semibold text-gray-700 text-lg"></div>

    <!-- Results Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-indigo-900 text-white sticky top-0">
            <tr>
              <th class="p-3 text-left">Part No</th>
              <th class="p-3 text-left">SL No</th>
              <th class="p-3 text-left">Voter Name</th>
              <th class="p-3 text-left">Relation Name</th>
              <th class="p-3 text-left" id="col_rlty">Relation Type</th>
              <th class="p-3 text-left" id="col_age">Age</th>
              <th class="p-3 text-left" id="col_sex">Sex</th>
              <th class="p-3 text-left" id="col_hno">House No</th>
              <th class="p-3 text-left" id="col_epic">EPIC</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden p-8 text-center text-gray-500">No results found.</div>
    </div>

    <!-- Pagination -->
    <div id="pageNav" class="mt-5 flex justify-center items-center gap-3 hidden">
      <button onclick="prevPage()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2 rounded-lg">
        ← Previous
      </button>
      <span id="pageInfo" class="font-semibold text-gray-700"></span>
      <button onclick="nextPage()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2 rounded-lg">
        Next →
      </button>
    </div>

  </div>

  <script>
    let allData = [];
    let searchResults = [];
    let currentPage = 1;
    let activeConstituency = 'anantapur';
    const PER_PAGE = 50;

    // ⚠️ Bump DATA_VERSION (v2, v3...) whenever you upload new JSON files
    const DATA_VERSION = 'v1';

    // ✅ 4 CONSTITUENCIES — Hindupur removed
    const constituencyConfig = {
      anantapur: {
        file: './anantapur_data.json',
        label: 'Anantapur',
        hasHouseNo: true,
        hasEPIC: true,
        hasAge: true,
        hasSex: true,
        hasRLTY: true
      },
      dharmavaram: {
        file: './dharmavaram_data.json',
        label: 'Dharmavaram',
        hasHouseNo: true,
        hasEPIC: true,
        hasAge: true,
        hasSex: true,
        hasRLTY: true
      },
      tadipatri: {
        file: './tadipatri_data.json',
        label: 'Tadipatri',
        hasHouseNo: true,
        hasEPIC: true,
        hasAge: true,
        hasSex: true,
        hasRLTY: true
      },
      penukonda: {
        file: './penukonda_data.json',
        label: 'Penukonda',
        hasHouseNo: true,
        hasEPIC: true,
        hasAge: true,
        hasSex: true,
        hasRLTY: true
      }
    };

    // ============================================================
    // 🗄️ IndexedDB Cache (7-day TTL)
    // ============================================================
    const DB_NAME  = 'VoterPortalDB';
    const DB_VER   = 1;
    const DB_STORE = 'voterData';
    const CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE, { keyPath: 'key' });
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = () => reject(new Error('IndexedDB unavailable'));
      });
    }

    async function getFromCache(key) {
      try {
        const db = await openDB();
        return new Promise(resolve => {
          const req = db.transaction(DB_STORE, 'readonly')
                        .objectStore(DB_STORE)
                        .get(`${DATA_VERSION}_${key}`);
          req.onsuccess = () => {
            const r = req.result;
            resolve((r && (Date.now() - r.ts) < CACHE_TTL) ? r.data : null);
          };
          req.onerror = () => resolve(null);
        });
      } catch { return null; }
    }

    async function saveToCache(key, data) {
      try {
        const db = await openDB();
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put({ key: `${DATA_VERSION}_${key}`, data, ts: Date.now() });
      } catch { /* silently skip */ }
    }

    async function getCachedConstituencies() {
      try {
        const db = await openDB();
        return new Promise(resolve => {
          const req = db.transaction(DB_STORE, 'readonly')
                        .objectStore(DB_STORE)
                        .getAll();
          req.onsuccess = () => {
            const cached = req.result
              .filter(r => r.key.startsWith(`${DATA_VERSION}_`))
              .map(r => r.key.replace(`${DATA_VERSION}_`, ''));
            resolve(cached);
          };
          req.onerror = () => resolve([]);
        });
      } catch { return []; }
    }

    async function clearAllCache() {
      try {
        const db = await openDB();
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).clear();
        Object.keys(memoryCache).forEach(k => delete memoryCache[k]);
        setStatus('green', '✅ Cache cleared! Reload any constituency fresh.');
        updateStorageInfo();
      } catch (e) {
        setStatus('red', '❌ Error clearing cache: ' + e.message);
      }
    }

    // ============================================================
    // ⚙️ Web Worker — Non-blocking JSON parse
    // ============================================================
    function parseJSONAsync(text) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([`
          self.onmessage = function(e) {
            try {
              self.postMessage({ ok: true, data: JSON.parse(e.data) });
            } catch(err) {
              self.postMessage({ ok: false, msg: err.message });
            }
          };
        `], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const worker = new Worker(url);
        worker.onmessage = e => {
          URL.revokeObjectURL(url);
          worker.terminate();
          e.data.ok ? resolve(e.data.data) : reject(new Error(e.data.msg));
        };
        worker.onerror = err => {
          URL.revokeObjectURL(url);
          worker.terminate();
          reject(err);
        };
        worker.postMessage(text);
      });
    }

    // ============================================================
    // 🎯 In-Memory Cache
    // ============================================================
    const memoryCache = {};

    // ============================================================
    // 📊 Storage Info Bar
    // ============================================================
    async function updateStorageInfo() {
      const cached = await getCachedConstituencies();
      let html = '💾 <strong>Cached:</strong> ';
      if (cached.length === 0) {
        html += '<span class="text-gray-400">Nothing cached yet</span>';
      } else {
        html += cached.map(c => {
          const isCurrent = c === activeConstituency ? ' ✓' : '';
          const label = constituencyConfig[c]?.label || c;
          return `<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-semibold">${label}${isCurrent}</span>`;
        }).join(' ');
      }
      document.getElementById('storageInfo').innerHTML = html;
    }

    // ============================================================
    // 🚀 Load Data — Lazy (on demand only)
    // ============================================================
    async function loadData(constituency) {
      const config = constituencyConfig[constituency];
      document.getElementById('searchBtn').disabled = true;
      allData = [];
      clearAll();

      // Step 1: In-memory (instant — zero I/O)
      if (memoryCache[constituency]) {
        allData = memoryCache[constituency];
        setStatus('green', `✅ ${config.label}: ${allData.length.toLocaleString()} records ready.`);
        document.getElementById('searchBtn').disabled = false;
        updateFieldVisibility();
        updateStorageInfo();
        return;
      }

      // Step 2: IndexedDB (fast — local, no network)
      setStatus('blue', `⏳ Checking cache for ${config.label}...`);
      const cached = await getFromCache(constituency);
      if (cached) {
        allData = cached;
        memoryCache[constituency] = cached;
        setStatus('green', `✅ ${config.label}: ${allData.length.toLocaleString()} records loaded (cached).`);
        document.getElementById('searchBtn').disabled = false;
        updateFieldVisibility();
        updateStorageInfo();
        return;
      }

      // Step 3: Network fetch (first time only)
      try {
        setStatus('blue', `⬇️ Downloading ${config.label} data… (first time only)`);
        const r = await fetch(config.file);
        if (!r.ok) throw new Error(`Could not load ${config.file}`);
        const text = await r.text();

        setStatus('blue', `⚙️ Processing ${config.label}...`);
        allData = await parseJSONAsync(text);

        memoryCache[constituency] = allData;
        await saveToCache(constituency, allData);

        setStatus('green', `✅ ${config.label}: ${allData.length.toLocaleString()} records loaded & cached.`);
        document.getElementById('searchBtn').disabled = false;
        updateFieldVisibility();
        updateStorageInfo();
      } catch (e) {
        setStatus('red', '❌ Error: ' + e.message);
      }
    }

    // ============================================================
    // UI HELPERS
    // ============================================================
    function norm(v) {
      return String(v ?? '').toUpperCase().replace(/[^A-Z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function rawNorm(v) {
      return String(v ?? '').toUpperCase().replace(/\s+/g, '').trim();
    }

    function setStatus(type, msg) {
      const el = document.getElementById('status');
      const classes = {
        blue:  'bg-blue-100 text-blue-800',
        green: 'bg-green-100 text-green-800',
        red:   'bg-red-100 text-red-800'
      };
      el.className = `${classes[type]} p-3 rounded mb-4 text-center font-semibold`;
      el.innerText = msg;
    }

    function updateFieldVisibility() {
      const config = constituencyConfig[activeConstituency];
      const show = (id, visible) => {
        const el = document.getElementById(id);
        if (el) el.style.display = visible ? '' : 'none';
      };
      show('field_hno', config.hasHouseNo);
      show('col_hno',   config.hasHouseNo);
      if (!config.hasHouseNo) document.getElementById('s_hno').value = '';
      show('field_epic', config.hasEPIC);
      show('col_epic',   config.hasEPIC);
      if (!config.hasEPIC) document.getElementById('s_epic').value = '';
      show('col_age',  config.hasAge);
      show('col_sex',  config.hasSex);
      show('col_rlty', config.hasRLTY);
    }

    function switchConstituency(name) {
      if (name === activeConstituency) return;
      activeConstituency = name;
      Object.keys(constituencyConfig).forEach(key => {
        const btn = document.getElementById(`btn_${key}`);
        if (!btn) return;
        btn.className = key === name
          ? 'px-4 py-2 rounded-full font-bold border-2 border-indigo-600 bg-indigo-600 text-white transition-all text-sm'
          : 'px-4 py-2 rounded-full font-bold border-2 border-indigo-600 text-indigo-600 bg-white transition-all text-sm';
      });
      loadData(name);
    }

    function doSearch() {
      const config = constituencyConfig[activeConstituency];
      const qName = norm(document.getElementById('s_name').value);
      const qRel  = norm(document.getElementById('s_relation').value);
      const qHno  = config.hasHouseNo ? rawNorm(document.getElementById('s_hno').value)  : '';
      const qEpic = config.hasEPIC    ? rawNorm(document.getElementById('s_epic').value) : '';
      const qPart = String(document.getElementById('s_part').value).trim();

      if (!qName && !qRel && !qHno && !qEpic && !qPart) {
        alert('Please enter at least one search field.');
        return;
      }

      searchResults = allData.filter(d => {
        const name = norm(d['NAME_ENG']);
        const rel  = norm(d['RELATION NAME']);
        const hno  = config.hasHouseNo ? rawNorm(d['New_Hno']) : '';
        const epic = config.hasEPIC    ? rawNorm(d['EPIC'])    : '';
        const part = String(d['part_no'] ?? '').trim();
        return (
          (!qName || name.includes(qName)) &&
          (!qRel  || rel.includes(qRel))   &&
          (!qHno  || hno.includes(qHno))   &&
          (!qEpic || epic.includes(qEpic)) &&
          (!qPart || part === qPart)
        );
      });
      currentPage = 1;
      render();
    }

    function render() {
      const config = constituencyConfig[activeConstituency];
      const tbody  = document.getElementById('tbody');
      const empty  = document.getElementById('empty');
      const count  = document.getElementById('count');
      const nav    = document.getElementById('pageNav');

      tbody.innerHTML = '';
      count.innerText = `Found ${searchResults.length} result${searchResults.length === 1 ? '' : 's'}.`;

      if (searchResults.length === 0) {
        empty.classList.remove('hidden');
        nav.classList.add('hidden');
        return;
      }
      empty.classList.add('hidden');

      const totalPages = Math.ceil(searchResults.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const page  = searchResults.slice(start, start + PER_PAGE);
      const vis   = (flag) => flag ? '' : 'display:none;';

      page.forEach(d => {
        tbody.innerHTML += `
          <tr class="hover:bg-gray-50 border-b">
            <td class="p-3 font-bold text-indigo-700">${d['part_no'] ?? '-'}</td>
            <td class="p-3">${d['slnoinpart'] ?? '-'}</td>
            <td class="p-3 font-bold text-gray-900">${d['NAME_ENG'] ?? '-'}</td>
            <td class="p-3">${d['RELATION NAME'] ?? '-'}</td>
            <td class="p-3 text-indigo-800 font-medium" style="${vis(config.hasRLTY)}">${d['RLTY'] ?? '-'}</td>
            <td class="p-3 text-center" style="${vis(config.hasAge)}">${d['age'] ?? '-'}</td>
            <td class="p-3 text-center font-bold" style="${vis(config.hasSex)}">${d['sex'] ?? '-'}</td>
            <td class="p-3 font-mono" style="${vis(config.hasHouseNo)}">${d['New_Hno'] ?? '-'}</td>
            <td class="p-3 font-mono text-xs text-indigo-600" style="${vis(config.hasEPIC)}">${d['EPIC'] ?? '-'}</td>
          </tr>
        `;
      });

      if (totalPages > 1) {
        nav.classList.remove('hidden');
        document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
      } else {
        nav.classList.add('hidden');
      }
    }

    function nextPage() {
      if (currentPage < Math.ceil(searchResults.length / PER_PAGE)) {
        currentPage++; render(); window.scrollTo(0, 0);
      }
    }

    function prevPage() {
      if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); }
    }

    function clearAll() {
      ['s_name','s_relation','s_hno','s_epic','s_part'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('tbody').innerHTML = '';
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('count').innerText = '';
      document.getElementById('pageNav').classList.add('hidden');
      searchResults = [];
      currentPage = 1;
    }

    function clearCache() {
      if (confirm('🗑️ Clear all cached voter data? Next load will re-download from network.')) {
        clearAllCache();
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // Start with Anantapur on page load
    loadData('anantapur');
    updateStorageInfo();
  </script>
</body>
</html>
